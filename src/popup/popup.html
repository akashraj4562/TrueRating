<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrueRating</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      width: 280px;
      padding: 16px;
      background: #fff;
      color: #1a1a1a;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .section {
      margin-bottom: 14px;
    }

    .section label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Master on/off switch */
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch .track {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .switch input:checked + .track { background: #2563eb; }
    .switch .track::after {
      content: "";
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .switch input:checked + .track::after { transform: translateX(18px); }
    .switch input:focus-visible + .track { outline: 2px solid #2563eb; outline-offset: 2px; }

    /* Button group (de-sponsor mode / rating method) */
    .btn-group {
      display: flex;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      overflow: hidden;
    }
    .btn-group button {
      flex: 1;
      padding: 5px 0;
      font-size: 12px;
      font-weight: 500;
      background: #fff;
      border: none;
      border-right: 1px solid #d1d5db;
      cursor: pointer;
      color: #374151;
      transition: background 0.15s, color 0.15s;
    }
    .btn-group button:last-child { border-right: none; }
    .btn-group button.active {
      background: #2563eb;
      color: #fff;
    }
    .btn-group button:focus-visible {
      outline: 2px solid #2563eb;
      outline-offset: -2px;
    }

    .hint {
      font-size: 11px;
      color: #6b7280;
      margin-top: 10px;
      line-height: 1.5;
    }

    footer {
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid #f3f4f6;
      font-size: 10px;
      color: #9ca3af;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <h1>TrueRating</h1>
    <!-- Master on/off -->
    <label class="switch" aria-label="Enable TrueRating">
      <input type="checkbox" id="masterToggle" />
      <span class="track"></span>
    </label>
  </header>

  <div id="controls">

    <div class="section">
      <label>Sponsored results</label>
      <div class="btn-group" role="group" aria-label="Sponsored result display mode">
        <button id="mode-dim"  class="active" aria-pressed="true">Dim</button>
        <button id="mode-hide" aria-pressed="false">Hide</button>
        <button id="mode-off"  aria-pressed="false">Off</button>
      </div>
    </div>

    <div class="section">
      <label>Rating method</label>
      <div class="btn-group" role="group" aria-label="Rating scoring method">
        <button id="method-bayesian" class="active" aria-pressed="true">Bayesian</button>
        <button id="method-wilson"   aria-pressed="false">Wilson</button>
      </div>
    </div>

    <p class="hint" id="scoreHint">
      Bayesian: adjusts star averages for review volume — a 3.9 from 200k ratings
      ranks above a 4.0 from 200.
    </p>

  </div>

  <footer>Client-side only · no data collected</footer>

  <script src="popup.js"></script>
</body>
</html>
